
["Dragon Config (龙配置)"]
	#启用龙复活指令 (Enable dragon resurrection command)
	enableDragonResurrectionCommand = true
	#地表生成的野生龙默认是否处于睡眠状态
	#Whether wild dragons generated on the surface default to sleeping state
	wildDragonDefaultSleepingSurface = true
	#地下龙巢生成的野生龙默认是否处于睡眠状态
	#Whether wild dragons generated in underground dens default to sleeping state
	wildDragonDefaultSleepingUnderground = true

	["Dragon Config (龙配置)"."Fire Dragon Config (火龙配置)"]
		#火龙是否进入睡眠状态 (Whether fire dragons will enter sleep state)
		fireDragonSleeping = true
		#火龙是否会破坏方块 (Whether fire dragons can destroy blocks)
		fireDragonDestroyBlocks = true
		#已驯服的火龙是否会破坏方块 (Whether tamed fire dragons can destroy blocks)
		tamedFireDragonDestroyBlocks = true
		#火龙的龙息是否会破坏方块 (Whether fire dragon breath can destroy blocks)
		fireDragonBreathDestroyBlocks = true
		#已驯服的火龙的龙息是否会破坏方块 (Whether tamed fire dragon breath can destroy blocks)
		tamedFireDragonBreathDestroyBlocks = true
		#火龙是否能够吐龙息 (Whether fire dragons can breath fire)
		fireDragonCanBreath = true
		#已驯服的火龙是否能够吐龙息 (Whether tamed fire dragons can breath fire)
		tamedFireDragonCanBreath = true

