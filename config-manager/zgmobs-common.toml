	#It determines the Minimum added Size for Germonium Slimes.
	#Range: 0.0 ~ 50.0
	germoniumSlimeSizeMin = 5.0
	#It determines the Maximum added Size for Germonium Slimes.
	#Range: 0.0 ~ 50.0
	germoniumSlimeSizeMax = 10.0
	#It determines the Minimum added Size for Germonium Magma Cubes.
	#Range: 0.0 ~ 50.0
	germoniumMagmaSizeMin = 5.0
	#It determines the Maximum added Size for Germonium Magma Cubes.
	#Range: 0.0 ~ 50.0
	germoniumMagmaSizeMax = 10.0
	#It determines the Minimum added Size for Germonium Phantoms.
	#Range: 0.0 ~ 50.0
	germoniumPhantomSizeMin = 3.0
	#It determines the Maximum added Size for Germonium Phantoms
	#Range: 0.0 ~ 50.0
	germoniumPhantomSizeMax = 6.0
	#It determines the Minimum added Explosion Power for Germonium Ghasts. Vanilla Ghasts have a base Explosion Power of 1
	#Range: 0.0 ~ 50.0
	germoniumGhastExplosionPowerMin = 3.0
	#It determines the Maximum added Explosion Power for Germonium Ghasts. Vanilla Ghasts have a base Explosion Power of 1
	#Range: 0.0 ~ 50.0
