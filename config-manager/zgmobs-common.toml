	germoniumCreeperExplosionPowerMin = 1.0
	#It determines the Maximum added Explosion Power for Germonium Creepers. If value is 0 the maximum extra explosion power is gonna be 0. Vanilla Creepers have a base Explosion Power of 3, If they are charged their base gets multiplied by 2.
	#Range: 0.0 ~ 50.0
	germoniumCreeperExplosionPowerMax = 4.0

