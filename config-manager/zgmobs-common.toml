
["Germonium Misc Settings"]
	#If true Germonium Infernium variants will have a Purple Fire instead of a Red one (Reference to Scaling Health by SilentChaos512). This requires a Restart.
	infernium_alt_texture = false
	#If true Germonium Infernium variants will have a Cyan Fire instead of a Red one. This requires a Restart.
	infernium_alt_texture2 = false
	#If true Germonium Infernium variants will have a Rainbow Fire instead of a Red one. This requires a Restart.
	infernium_alt_texture3 = false
	#If true Germonium Celestium variants will have a Cyan Fire instead of a Rainbow one (Reference to the v1.0.0 textures of ZG Mobs). This requires a Restart.
	celestium_alt_texture = false
	#If true Germonium Celestium variants will have a Red Fire instead of a Rainbow one. This requires a Restart.
	celestium_alt_texture2 = false
	#If true Germonium Celestium variants will have a Purple Fire instead of a Rainbow one. This requires a Restart.
	celestium_alt_texture3 = false

["Heart Crystal Settings"]
	#If true most Heart Crystal items will be replaced with their LSO counterparts.
	lso_compat = false
	#If true Extra Health provided by the Heart Crystals will be lost on Death.
	loose_extra_health_on_death = false
	#The amount of Extra Health provided by the Heart Crystals lost on Death.
	#Range: 1.0 ~ 1.7976931348623157E308
	extra_health_lost_per_death = 2.0
	#The amount of Maximum Extra Health provided by the Heart Crystals.
	#Range: 1.0 ~ 1.7976931348623157E308
	max_extra_health = 20.0
	#The amount of Extra Health provided by one Heart Crystal. If value is 0 the Heart Crystal will not add any Extra Health.
	#Range: 0.0 ~ 1.7976931348623157E308
	extra_health_per_heart = 2.0
	#If true Heart Crystals will add the Regeneration Effect to the Consumer.
	allow_heart_regen = true
	#The duration (in ticks) of the Regeneration Effect provided by the Heart Crystals.
	#Range: > 0
	heart_regen_duration = 100
	#The amplifier of the Regeneration Effect provided by the Heart Crystals. Note that amplifier with a value of 0 means level 1, value 1 means level 2 and so on.
	#Range: > 0
	heart_regen_amplifier = 1
	#The Minimum XP Level required to use The Heart Crystal item. If value is 0 there will be no XP requirements.
	#Range: > 0
	min_level_required = 10
	#The amount of XP Levels that will be consumed when using The Heart Crystal item. If value is 0 no XP Levels will be consumed.
	#Range: > 0
	xp_levels_consumed = 5
	#The Use Duration (in ticks) of The Heart Crystal item.
	#Range: > 1
	heart_use_duration = 30

	["Heart Crystal Settings"."Heart Crystal Drop Settings"]
		#The Drop Rate for Germonium Infernium variants. If value is 0 Germonium Infernium will drop no Heart Crystal X items.
		#Range: 0.0 ~ 100.0
		infernium_drop_rate = 50.0
		#The Minimum amount of Heart Crystal X item drops for Germonium Infernium variants.
		#Range: > 0
		infernium_drop_min = 2
		#The Maximum amount of Heart Crystal X item drops for Germonium Infernium variants.
		#Range: > 0
		infernium_drop_max = 6
		#Which type of heart item Infernium mobs can drop. Options: HEART, SHARD, DUST
		#Allowed Values: HEART, SHARD, DUST
		infernium_drop_type = "SHARD"
		#The Drop Rate for Germonium Infernium variants. If value is 0 Germonium Infernium will drop no Heart Crystal X items.
		#Range: 0.0 ~ 100.0
		celestium_drop_rate = 100.0
		#The Minimum amount of Heart Crystal X item drops for Germonium Infernium variants.
		#Range: > 0
		celestium_drop_min = 1
		#The Maximum amount of Heart Crystal X item drops for Germonium Infernium variants.
		#Range: > 0
		celestium_drop_max = 3
		#Which type of heart item Celestium mobs can drop. Options: HEART, SHARD, DUST
		#Allowed Values: HEART, SHARD, DUST
		celestium_drop_type = "HEART"

	["Heart Crystal Settings"."Heart Crystal Items Loot Settings"]
		#Enable or disable Heart Crystal X items loot in chests (abandoned mineshaft, dungeon, desert pyramid, etc).
		chestLootEnabled = true
		#Chance that Heart Crystal X items loot appears in a target chest (0.0 - 100.0).
		#Range: 0.0 ~ 100.0
		chestLootChance = 25.0
		#The number of weight Heart Crystal X items should have in loot. Higher means it will be really common loot, lower means a more rarer loot depending on the loot table.
		#Range: 1 ~ 100
		heartItemWeight = 3
		#Minimum number of Heart Crystal X items to add to loot.
		#Range: 0 ~ 64
		minHeartItems = 0
		#Maximum number of Heart Crystal X items to inject.
		#Range: 1 ~ 64
		maxHeartItems = 4
		#Which Heart Crystal X items to inject into chests: DUST, SHARD, or HEART.
		#Allowed Values: DUST, SHARD, HEART
		heartItem = "DUST"
		#    List of chest loot tables that should receive injected loot.
		#    Format: "namespace:path"
		#    Examples:
		#      "minecraft:chests/abandoned_mineshaft"
		#      "minecraft:chests/simple_dungeon"
		#      "minecraft:chests/desert_pyramid"
		#
		tables = ["minecraft:chests/abandoned_mineshaft", "minecraft:chests/simple_dungeon", "minecraft:chests/desert_pyramid"]

["Germonium Spawning"]
	#If true no Germonium variants will spawn.
	disableGermonium = false
	#If true it will allow Germonium variants to spawn from Monster Spawners. If false no Germonium variants will spawn from Monster Spawners.
	allowGermoniumFromSpawners = false
	#It determines the general chance for a hostile mob to become a Germonium Variant. If % is 1.0 then thats 1%
	#Range: 0.0 ~ 100.0
	germoniumBaseChance = 1.0
	#It determines the chance for Germonium Celestiums to spawn. If for example the % is 50 now there is a 50% chance for both Variants. If % is 0, Germonium Celestiums will not spawn.
	#Range: 0.0 ~ 100.0
	germoniumEqualizer = 1.0
	#Blacklist of entities or tags that cannot become Germonium variants.
	#Use entries like:
	# - 'minecraft:wither' for a specific entity
	# - '#forge:bosses' for a tag
	# - you can also use regex for example: '/^minecraft:(zombie|creeper|enderman|skeleton|spider)$/' or '/^minecraft:[a-z0-9_]+$/'
	entityBlacklist = ["minecraft:ender_dragon", "minecraft:wither"]

